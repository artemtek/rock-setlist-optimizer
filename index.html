<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Setlist Optimizer</title>
<link rel="stylesheet" href="style.css">
<script defer src="alpine.min.js"></script>
<script src="app.js"></script>
</head>
<body>

<header>
  <h1><span>///</span> Rock Setlist Optimizer</h1>
</header>

<div x-data="app()" x-cloak>

  <div class="tabs">
    <div class="tab" :class="tab === 'musicians' && 'active'" @click="tab = 'musicians'">Musicians</div>
    <div class="tab" :class="tab === 'songs' && 'active'" @click="tab = 'songs'">Songs</div>
    <div class="tab" :class="tab === 'setlist' && 'active'" @click="tab = 'setlist'">Setlist</div>
  </div>

  <div class="container">

    <!-- MUSICIANS PANEL -->
    <div x-show="tab === 'musicians'">
      <div class="add-row">
        <input type="text" x-model="newMusician" placeholder="Musician name (e.g. Jim H.)" style="flex:1"
               @keydown.enter="addMusician()">
        <button class="btn-primary" @click="addMusician()">Add musician</button>
      </div>
      <div class="section-title">Roster (<span x-text="musicians.length"></span>)</div>
      <div class="empty-state" x-show="!musicians.length">No musicians yet. Add one above.</div>
      <table class="roster-table" x-show="musicians.length">
        <thead><tr><th>Name</th><th class="col-weight">Weight</th><th class="col-absent">Absent</th><th></th></tr></thead>
        <tbody>
          <template x-for="m in musicians" :key="m.name">
            <tr :class="isAbsent(m.name) && 'row-absent'">
              <td>
                <span x-text="m.name"></span>
              </td>
              <td class="col-weight">
                <div class="weight-stepper">
                  <button class="weight-btn" @click="updateWeight(m.name, m.weight - 1)" :disabled="m.weight <= 1">&minus;</button>
                  <input type="number" class="weight-input" :value="m.weight" min="1" max="99"
                         @change="updateWeight(m.name, $event.target.value)">
                  <button class="weight-btn" @click="updateWeight(m.name, m.weight + 1)" :disabled="m.weight >= 99">+</button>
                </div>
              </td>
              <td class="col-absent">
                <input type="checkbox" class="absent-check" :checked="isAbsent(m.name)" @change="toggleAbsent(m.name)">
              </td>
              <td><button class="row-remove" @click="removeMusician(m.name)" title="Remove">&times;</button></td>
            </tr>
          </template>
        </tbody>
      </table>

      <div class="io-row">
        <button class="btn-ghost btn-small" @click="exportDownload()">Export file</button>
        <button class="btn-ghost btn-small" @click="exportCopy()">Copy JSON</button>
        <button class="btn-ghost btn-small" @click="openImportModal()">Import</button>
      </div>

      <!-- Import Modal -->
      <template x-if="showImportModal">
        <div class="modal-overlay" @click.self="showImportModal = false">
          <div class="modal-box">
            <div class="modal-title">Import data</div>
            <div style="margin-bottom:12px">
              <label class="btn-primary btn-small" style="cursor:pointer;display:inline-block">
                Choose file
                <input type="file" accept=".json,application/json" style="display:none" @change="importFromFile($event)">
              </label>
            </div>
            <div class="modal-divider">or paste JSON below</div>
            <textarea class="import-textarea" x-model="importText" placeholder='{"musicians":[...], "songs":[...]}'></textarea>
            <div class="import-error" x-show="importError" x-text="importError"></div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
              <button class="btn-primary" @click="importFromPaste()" :disabled="!importText.trim()">Import</button>
              <button class="btn-ghost" @click="showImportModal = false">Cancel</button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- SONGS PANEL -->
    <div x-show="tab === 'songs'">
      <button class="btn-primary" style="margin-bottom:16px" @click="showSongForm(-1)" x-show="!songForm">+ Add song</button>

      <template x-if="songForm && editingIndex === -1">
        <div class="song-form">
          <div class="form-row">
            <input type="text" placeholder="Song title" x-model="songForm.title">
            <input type="text" placeholder="Artist" x-model="songForm.artist">
          </div>
          <template x-for="role in ROLES" :key="role">
            <div class="role-section">
              <div class="role-label" x-text="ROLE_LABELS[role]"></div>
              <div class="role-members">
                <template x-for="m in songForm.members[role]" :key="m">
                  <span class="member-tag">
                    <span x-text="m"></span>
                    <span class="remove" @click="removeMemberFromRole(role, m)">&times;</span>
                  </span>
                </template>
                <select class="role-add-select" x-show="availableForRole(role).length"
                        @change="addMemberToRole(role, $event.target.value); $event.target.value = ''">
                  <option value="">+ add</option>
                  <template x-for="m in availableForRole(role)" :key="m.name">
                    <option :value="m.name" x-text="m.name"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn-primary" @click="saveSong()">Add song</button>
            <button class="btn-ghost" @click="cancelSongForm()">Cancel</button>
          </div>
        </div>
      </template>

      <div class="empty-state" x-show="!songs.length">No songs yet. Add one above.</div>
      <template x-for="(song, i) in songs" :key="i">
        <div>
          <template x-if="songForm && editingIndex === i">
            <div class="song-form">
              <div class="form-row">
                <input type="text" placeholder="Song title" x-model="songForm.title">
                <input type="text" placeholder="Artist" x-model="songForm.artist">
              </div>
              <template x-for="role in ROLES" :key="role">
                <div class="role-section">
                  <div class="role-label" x-text="ROLE_LABELS[role]"></div>
                  <div class="role-members">
                    <template x-for="m in songForm.members[role]" :key="m">
                      <span class="member-tag">
                        <span x-text="m"></span>
                        <span class="remove" @click="removeMemberFromRole(role, m)">&times;</span>
                      </span>
                    </template>
                    <select class="role-add-select" x-show="availableForRole(role).length"
                            @change="addMemberToRole(role, $event.target.value); $event.target.value = ''">
                      <option value="">+ add</option>
                      <template x-for="m in availableForRole(role)" :key="m.name">
                        <option :value="m.name" x-text="m.name"></option>
                      </template>
                    </select>
                  </div>
                </div>
              </template>
              <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn-primary" @click="saveSong()">Update song</button>
                <button class="btn-ghost" @click="cancelSongForm()">Cancel</button>
              </div>
            </div>
          </template>
          <template x-if="editingIndex !== i">
            <div class="card">
              <div class="card-header">
                <div>
                  <div class="card-title" x-text="song.title"></div>
                  <div class="card-subtitle" x-text="song.artist"></div>
                </div>
                <div style="display:flex;gap:6px">
                  <button class="btn-small btn-ghost" @click="showSongForm(i)">Edit</button>
                  <button class="btn-small btn-danger" @click="if(confirm('Delete \u201c' + song.title + '\u201d?')) deleteSong(i)">Delete</button>
                </div>
              </div>
              <template x-for="role in ROLES" :key="role">
                <div class="role-section" x-show="(song.members[role] || []).length">
                  <div class="role-label" x-text="ROLE_LABELS[role]"></div>
                  <div class="role-members">
                    <template x-for="m in (song.members[role] || [])" :key="m">
                      <span class="member-tag" x-text="m"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- SETLIST PANEL -->
    <div x-show="tab === 'setlist'">
      <div class="section-title">Select songs for this rehearsal set</div>
      <div class="empty-state" x-show="!songs.length">Add some songs first.</div>
      <template x-for="(song, i) in songs" :key="i">
        <div class="card setlist-song">
          <input type="checkbox" :checked="!excluded.includes(i)" @change="toggleExcluded(i)">
          <div class="setlist-song-info">
            <div class="setlist-song-title" x-text="song.title"></div>
            <div class="setlist-song-artist" x-text="song.artist"></div>
            <div class="setlist-song-members" x-text="allMembersList(song).join(', ')"></div>
          </div>
        </div>
      </template>
      <div class="mode-toggle" x-show="songs.length">
        <label class="toggle-label">
          <input type="checkbox" :checked="reverseMode" @change="toggleReverseMode()">
          <span class="toggle-text">Reverse priority</span>
          <span class="toggle-hint" x-text="reverseMode ? 'Maximize shared musicians between songs' : 'Minimize shared musicians between songs'"></span>
        </label>
      </div>
      <div class="absent-notice" x-show="absent.length">
        <span x-text="absent.length"></span> musician(s) marked absent
      </div>
      <button class="btn-calculate" @click="calculate()" x-show="songs.length"
              x-text="reverseMode ? 'Calculate (max overlap)' : 'Calculate optimal order'"></button>

      <div style="margin-top:24px">
        <template x-if="results && results.error">
          <div class="empty-state" x-text="results.error"></div>
        </template>
        <template x-if="results && !results.error">
          <div>
            <template x-for="(entry, i) in results.entries" :key="i">
              <div class="result-card"
                   :style="'border-left-color:' + (results.reverseMode ? (entry.shared.length ? 'var(--green)' : 'var(--red)') : (entry.shared.length ? 'var(--red)' : 'var(--green)'))">
                <div class="result-number"
                     :style="'background:' + (results.reverseMode ? (entry.shared.length ? 'var(--green)' : 'var(--red)') : (entry.shared.length ? 'var(--red)' : 'var(--green)'))"
                     x-text="i + 1"></div>
                <div class="result-info">
                  <div class="result-title" x-text="entry.song.title"></div>
                  <div class="result-artist" x-text="entry.song.artist"></div>
                  <div class="result-band" x-text="allMembersList(entry.song).join(', ')"></div>
                  <div :class="results.reverseMode ? (entry.shared.length ? 'result-overlap overlap-ok' : 'result-overlap overlap-warn') : (entry.shared.length ? 'result-overlap overlap-warn' : 'result-overlap overlap-ok')"
                       x-text="overlapLabel(entry)"></div>
                </div>
              </div>
            </template>
            <div class="loop-back">Loop back to: <span x-text="results.loopBackTitle"></span></div>
            <div class="result-summary">
              <div class="total" x-text="results.totalCost"></div>
              <div class="label" x-text="results.reverseMode ? 'total shared overlap across ' + results.songCount + ' songs (maximized)' : 'total weighted overlap cost across ' + results.songCount + ' songs'"></div>
            </div>
          </div>
        </template>
      </div>
    </div>

  </div>


</div>

</body>
</html>
